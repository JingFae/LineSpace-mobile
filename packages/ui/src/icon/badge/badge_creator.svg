<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 120" width="350" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=SF+Pro+Display:wght@500&amp;display=swap');
      /* 放大字体：主标题调整为 42px，副标题调整为 13px */
      .badge-title-iw { font-family: 'Great Vibes', cursive; font-size: 42px; fill: #B8860B; }
      .badge-subtitle-iw { font-family: 'SF Pro Display', sans-serif; font-size: 13px; fill: #9CA3AF; letter-spacing: 3px; text-transform: uppercase; font-weight: 500;}
    </style>
    
    <linearGradient id="goldGrad_v2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCEABB"/>
      <stop offset="100%" stop-color="#F8B500"/>
    </linearGradient>
    <linearGradient id="goldDarkGrad_v2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8B500"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <filter id="softGlow_v2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#F8B500" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景容器 -->
  <rect x="0" y="0" width="350" height="120" rx="60" fill="#FFFFFF" stroke="#FCEABB" stroke-width="1.5" opacity="0.6"/>

  <!-- 左侧圆形图形 -->
  <g transform="translate(60, 60)" filter="url(#softGlow_v2)">
    <circle cx="0" cy="0" r="50" fill="#FFFAF0" stroke="url(#goldGrad_v2)" stroke-width="4"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="url(#goldGrad_v2)" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>

    <!-- 羽毛笔矢量图形 -->
    <g transform="translate(-90, -95)">
      <path d="M120 40 C120 40 135 60 125 90 C115 120 85 135 60 145 C50 149 45 150 45 150 C45 150 50 140 55 130 C65 110 80 80 90 65 C100 50 115 35 120 40 Z" fill="url(#goldGrad_v2)"/>
      <path d="M45 150 L120 40" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M75 110 Q90 100 100 90" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M90 85 Q105 75 110 65" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      
      <!-- 墨滴 -->
      <path d="M135 105 C135 112 129 118 122 118 C115 118 109 112 109 105 C109 95 122 80 122 80 C122 80 135 95 135 105 Z" fill="url(#goldDarkGrad_v2)"/>
      <circle cx="118" cy="102" r="2.5" fill="#FFFFFF" opacity="0.6"/>
    </g>
  </g>

  <!-- 右侧文字区域 (调整了排版基线以适应大字体) -->
  <g transform="translate(130, 42)">
    <text x="0" y="25" class="badge-title-iw">Ink Weaver</text>
    <text x="0" y="52" class="badge-subtitle-iw">Poetry Creator</text>
  </g>
</svg>
