<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 120" width="350" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=SF+Pro+Display:wght@500&amp;display=swap');
      /* 放大字体：主标题调整为 42px，副标题调整为 13px */
      .badge-title-se { font-family: 'Great Vibes', cursive; font-size: 42px; fill: #FEF3C7; }
      .badge-subtitle-se { font-family: 'SF Pro Display', sans-serif; font-size: 13px; fill: #CBD5E1; letter-spacing: 3px; text-transform: uppercase; font-weight: 500;}
    </style>
    
    <!-- 调浅后的背景渐变：使用了更柔和的灰蓝色 -->
    <linearGradient id="blueGrad_v3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    
    <radialGradient id="lanternGlow_v2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEF08A" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FDE047" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0"/>
    </radialGradient>

    <!-- 阴影滤镜也相应减弱了一点点 -->
    <filter id="echoShadow_v3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景容器 -->
  <rect x="0" y="0" width="350" height="120" rx="60" fill="url(#blueGrad_v3)" stroke="#94A3B8" stroke-width="1.5" opacity="0.95" filter="url(#echoShadow_v3)"/>

  <!-- 左侧圆形图形 -->
  <g transform="translate(60, 60)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#94A3B8" stroke-width="3"/>
    
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FDE047" stroke-width="1.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FDE047" stroke-width="1.5" opacity="0.35"/>
    <circle cx="0" cy="0" r="32" fill="url(#lanternGlow_v2)"/>

    <!-- 提灯矢量图形 -->
    <g transform="translate(-100, -90)">
      <path d="M100 50 C80 50 75 65 85 80" fill="none" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
      <path d="M100 50 C120 50 125 65 115 80" fill="none" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
      
      <path d="M85 70 L115 70 L110 60 L90 60 Z" fill="#475569"/>
      <rect x="95" y="55" width="10" height="5" fill="#94A3B8" rx="2"/>
      
      <path d="M85 70 L115 70 L120 115 L80 115 Z" fill="none" stroke="#94A3B8" stroke-width="2.5"/>
      
      <path d="M100 85 C95 95 90 100 90 105 C90 110 95 112 100 112 C105 112 110 110 110 105 C110 100 105 95 100 85 Z" fill="#F59E0B"/>
      <path d="M100 92 C98 98 96 102 96 105 C96 108 98 109 100 109 C102 109 104 108 104 105 C104 102 102 98 100 92 Z" fill="#FEF3C7"/>

      <path d="M75 115 L125 115 L120 130 L80 130 Z" fill="#475569"/>
      <rect x="85" y="118" width="30" height="4" fill="#334155" rx="2"/>
    </g>
  </g>

  <!-- 右侧文字区域 (调整了排版基线以适应大字体) -->
  <g transform="translate(130, 42)">
    <text x="0" y="25" class="badge-title-se">Soul Echo</text>
    <text x="0" y="52" class="badge-subtitle-se">Poetry Reviewer</text>
  </g>
</svg>
