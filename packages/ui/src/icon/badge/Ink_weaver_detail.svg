<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <!-- 引入优雅的古典衬线字体 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&amp;display=swap');
      .badge-title { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 20px; fill: #B8860B; text-anchor: middle; letter-spacing: 0.5px; }
      .badge-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 10px; fill: #9CA3AF; text-anchor: middle; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;}
    </style>
    
    <!-- 晨曦金渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCEABB"/>
      <stop offset="100%" stop-color="#F8B500"/>
    </linearGradient>
    <linearGradient id="goldDarkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8B500"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#F8B500" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 外层发光圆环 -->
  <circle cx="100" cy="90" r="70" fill="#FFFAF0" stroke="url(#goldGrad)" stroke-width="4" filter="url(#softGlow)"/>
  <circle cx="100" cy="90" r="62" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>

  <!-- 羽毛笔矢量图形 -->
  <g transform="translate(15, 5)">
    <path d="M120 40 C120 40 135 60 125 90 C115 120 85 135 60 145 C50 149 45 150 45 150 C45 150 50 140 55 130 C65 110 80 80 90 65 C100 50 115 35 120 40 Z" fill="url(#goldGrad)"/>
    <path d="M45 150 L120 40" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M75 110 Q90 100 100 90" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M90 85 Q105 75 110 65" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    
    <!-- 墨滴 -->
    <path d="M135 105 C135 112 129 118 122 118 C115 118 109 112 109 105 C109 95 122 80 122 80 C122 80 135 95 135 105 Z" fill="url(#goldDarkGrad)"/>
    <!-- 墨滴高光 -->
    <circle cx="118" cy="102" r="2.5" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- 艺术排版 -->
  <text x="100" y="200" class="badge-title">Ink Weaver</text>
  <text x="100" y="222" class="badge-subtitle">Poetry Creator</text>
</svg>
